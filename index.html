# AX 전문 교육·컨설팅 사업 계획 방향

> 출처: `260630_녹취.txt` (2026-06-30 녹취) 정리
> 작성일: 2026-07-07

---

## 1. 사업 개요 및 배경

- **현재 사업**: 스마트 제조·물류 업체를 대상으로 한 서비스(구축) 공급자 사업.
- **신규 방향**: 기존 구축 서비스에 더해 **10주 실전 교육을 중심(허브)**으로 하는 새로운 브랜드 사업 전개. 교육은 그 자체로 완결된 가치이고, 기업 상황에 따라 **① 심화 컨설팅 · ② 구축((주)팩앤롤) · ③ 정부지원 컨설팅**으로 **선택적으로 확장**된다. (선형 깔때기 아님 — [홈 카피·구조 워크북](05_홈페이지_카피_구조_워크북.md) §3)
- **핵심 문제 인식**: 수요 기업(중소 제조·물류)이 스마트화(DX/AX/AI)의 내용과 단계를 잘 모르며, 공급자·수요자 모두 "DX·AX·AI가 무엇인지"에 대해 혼란이 있음.
- **본질**: 결국 회사의 전산화 수준을 1단계 → 2단계 → 3단계로 올리는 **고도화 레벨업**을 도와주는 것.

### 사업 모델 형태 (교육 허브 + 선택 확장)

```
        [ 10주 실전 교육 ] (중심 · 스스로 AI 역량 확보, 이것만으로도 완결)
                 │  필요에 따라 선택적 확장
     ┌───────────┼───────────┐
 ① 심화 컨설팅   ② 구축         ③ 정부지원 컨설팅
 AX 로드맵·방향  (주)팩앤롤에    2027 지원사업
 심화 구체화     솔루션 개발 의뢰  신청·선정·구축 대응
```

- **모두가 구축·정부지원까지 가는 구조가 아님.** 교육만으로 끝내도 되고, 필요한 갈래만 선택한다.
- ① 심화 컨설팅은 교육 2단계(진단·과제 정의)를 **넘어선 별도 심화 서비스**.

### 전산화/고도화 단계 구분

| 단계 | 내용 | 관련 시스템 |
|------|------|-------------|
| 1단계 | 회사 업무를 프로세스화 + 데이터화 | 영업·운영 중심 → **ERP** / 생산·품질 → **MES** / 창고·물류 → **WMS** |
| 2단계 | 시스템 고도화 | — |
| 3단계 | AI/자동화 활용 고도화 (센서·자동화 설비 등) | — |

## 2. 시장 및 고객 분석

- **주 타겟**: 중소기업(제조·물류).
- **현황**: 정부 지원을 잘 활용하는 기업은 약 **30% 수준**. 아직 초기 단계에 있는 기업도 모두 잠재 고객.
- **비용 구조**:
  - **장비가 들어가지 않는 경우** → 자기 부담으로 진행 가능.
  - **장비(센서·자동화 설비 등)가 들어가는 경우** → 정부 보조를 받아야 효과가 큼.
- **AX/AI 심화**: 장비 투입 시 효과가 더 커지므로 정부 지원 활용이 중요.

### 수요 기업이 알아야 할 핵심 (공급자가 가이드해야 할 내용)

1. 무엇을 AI로 활용할 것인가 (본인의 활용 포인트 파악)
2. 준비해야 할 것들
3. 비용은 어느 정도인가 (자기 부담 vs 정부 보조)
4. 정부 지원 **시기**와 **선정을 위한 준비 기간**

---

## 3. 사업 모델: 2개 고객군

### 3-1. 수요 기업 대상 (⭐ 1순위)

- 막연한 니즈를 **구체적인 서비스(콘텐츠·실습)**로 전환하는 것이 과제.
- **목적**: 단순 교육 완료가 아니라, **신뢰감 있는 수요 고객을 모객(募客)**하는 것.
- 작은 기업들을 **지속적·꾸준한 고객**으로 확보.
- **진입점은 교육**. 교육에서 신뢰를 얻으면 기업 상황에 따라 심화 컨설팅·구축·정부지원 컨설팅으로 확장 → 그 흐름 위에서 2027년 정부 지원 사업 연결. (모든 고객이 구축까지 가지는 않음 — 선택형)

### 3-2. 공급 기업 대상 (신규 아이디어, 2순위)

- **배경**: 공급 기업으로서 겪은 애로사항을 직접 경험했기 때문에 교육 가능. 정부 지원 취지도 수요·공급 기업 모두 육성하는 데 있음.
- **시장**: 스마트공장 공급 기업 풀에 수천 개 회사 존재. 안정적인 회사는 약 40%, 나머지는 건수도 적고 방법을 모르는 기업이 태반.
- **교육 주제**:
  - 영업을 어떻게 해야 하는가
  - 시스템을 어떻게 개발하고 유지·관리해야 하는가
  - 지원 사업을 어떻게 관리해야 하는가
  - 요구사항 분석, 화면 설계·개발의 **자동화(100%)·반자동화(50%)** 도구 활용
- **기대 효과**: 영업력은 있으나 개발력이 부족하거나 지원 사업 활용을 모르는 기업과 **공급 네트워크 구축** → 영업·기술 공유, 지역 파트너십.

> **우선순위 논리**: 공급 기업이 실패하지 않아야 수요 기업도 실패하지 않는다. 단, 1순위는 어디까지나 수요 기업.

---

## 4. 커리큘럼 (수요 기업 대상)

- **기간**: 약 2개월(8~10주).
- **일정 후보**: 매주 토요일 09:00~18:00 / 14:00~18:00 / 또는 평일.
- **핵심 원칙**: 듣는 사람의 시간을 아끼는 **핵심 위주의 강의**. (본인이 타 강의를 들으며 "시간이 아깝다"고 느낀 경험 반영)

### 3단계 구성

| 단계 | 내용 | 산출물 |
|------|------|--------|
| **1단계** | 제조·물류 기업이 **AI 기본 툴을 어떻게 사용할 것인가** (AI 기본 교육) | AI 활용 기초 역량 |
| **2단계** | 본인 기업의 문제점 진단 + AI 활용 **컨설팅**, 무엇을 해결할 것인지 **주제 선정** | DX/AX 컨설팅 결과, 해결 주제 |
| **3단계** | AI를 활용해 선정한 주제에 대해 **개발·결과물 실습** | 실제 아웃풋(개발물) |

**교육 이후 — 선택형 확장 (교육 허브 + 3갈래, §1 참조)**: 교육은 그 자체로 완결되며, 기업 상황에 따라 아래를 **선택**한다.

- **① 심화 컨설팅** — 교육 2단계(과제 정의)를 넘어 AX 로드맵·방향을 심화 구체화.
- **② 구축((주)팩앤롤)** — 자체 역량이 부족하면 고급 엔지니어링·개발·유지관리를 의뢰(파트너십).
- **③ 정부지원 컨설팅** — 10~12월 코스 내용을 토대로 2027년 지원 사업 신청·선정·구축까지 대응.
- 뛰어난 참여자·해결 포인트가 작은 경우 → **교육만으로 자체 해결**하고 종료해도 됨.

```
2026

- 기존 방식(블로그 홍보 → 연락 대기 → 전화·이메일 대응)에서 벗어나 **선제적 마케팅**으로 전환.

- "AX 전문 당사" 타이틀 확립 목표 (8월 말 ~ 9월).

- **관건**: 자료가 매우 잘 준비되어야 함 (PPT, 영상 등). 제작이 쉽지 않으나 **AI 도입으로 가능**해진 영역.
- **8월까지** 교육 콘텐츠 제작. 자연스럽게 녹음 → 강의안으로 정리하는 방식 활용.
- **결과물 시연**: 커리큘럼만 봐도 관심을 가질 수 있도록 **실제 아웃풋(시각적 결과물)**을 보여줄 것.
  - "AI를 엑셀처럼 쓰는 수준"을 넘어 실제 개발까지 들어가는 사례 제시.
  - 업종별 AI 활용 사례를 시각적으로 제시.

- **회사 홈페이지**뿐 아니라 **강사 개인의 역할·PR**이 매우 중요.

- **채널 전략**:

## 2. 사업 한 줄 정의 & 목표

> **제조·물류 중소기업이 AI/AX를 "무엇부터·어떻게·얼마로" 시작할지 배우는 10주 실전 교육이 중심. 교육만으로 스스로 역량을 갖춰도 되고, 필요에 따라 심화 컨설팅·구축((주)팩앤롤)·정부지원 컨설팅으로 선택 확장한다.**

**사업 모델**: **교육 허브 + 선택 3갈래**(선형 깔때기 아님) — 상세는 [홈 카피·구조 워크북](05_홈페이지_카피_구조_워크북.md) §3.

**최상위 목표**: 신뢰감 있는 수요기업을 **무료 AX 상담으로 모객** → 교육으로 신뢰 형성 → 기업 상황에 맞는 갈래(컨설팅·구축·정부지원)로 전환 → 2027 정부지원 사업 연결.

- **P1. 제조 수요기업** (대표/기획·생산) — 1순위. 데이터 흩어짐, MES·자동화 고민. "뭘 어떻게 쓰지? 정부지원은? 비용은?"

## 8. 당사 소개 섹션 (신뢰 자산) — 실자료 ★

**핵심 메시지**:
- 스마트공장 **공급기업 pool 등록** 기업 (정부지원 공식 공급자)
- 제조·물류 기업 대상 **솔루션 구축 레퍼런스 보유**
- **정부 지원사업 수행 실적 보유**
- 개발·유지보수까지 — 만들고 끝이 아니라 운영까지

**표현 방법 제안** (레퍼런스가 공개 제약이 있을 수 있으므로):
- 상단 **숫자 배지 3~4개**: 구축 N+건 / 수행 지원사업 N건 / 업력 N년 / 공급기업 pool 등록
- **익명화 사례 카드**: `업종 · 규모 · 과제 · 성과(한 줄)` 형식 (고객사명 비공개 가능)
- 공개 허락된 로고만 **로고 월**
- "pool 등록" 배지로 공신력 시각화

> **확정 필요**: 구축 건수·지원사업 수행 건수·업력 등 **실제 수치**, 공개 가능 레퍼런스 범위.

**인프라/기타**: 당사 서버(PHP 지원) 호스팅, SSL(https), GA4, SEO(타이틀·메타·OG·사이트맵), Pretendard 웹폰트.

## 3. 솔루션 / 여정 ✅ 개념 확정 (교육 허브 + 3갈래)

**역할**: 사업 모델의 정확한 형태 전달. **선형 깔때기가 아니라, 10주 교육을 중심에 두고 필요에 따라 뻗는 선택형 모델.**

**섹션 헤드** ✅
> 교육에서 시작해, **필요한 만큼 함께 합니다.**

**서브카피** ✅
> 교육에서 더 나아가 컨설팅, 구축, 정부지원까지 이어집니다.

> ✅ **확정(2026-07-07)**: 기존 문서·초안의 `진단→교육→컨설팅→구축→정부지원` **선형 흐름**을 폐기하고 **교육 허브 + 선택 3갈래**로 확정. 이 개념을 [사업계획방향](01_사업계획방향.md) §1·§3-1·§4 및 [기획서](04_랜딩페이지_기획서.md) §2·§6·§11에 반영함.

### 확정 개념 모델

**중심(허브) — 10주 실전 교육**: 기업이 **스스로 AI를 쓰는 힘**을 기른다. 이것만으로도 완결된 가치(구축·지원 안 해도 됨).

**여기서 필요에 따라 선택적으로 확장:**

| 갈래 | 내용 | 누구에게 |
|------|------|----------|
| ① **심화 컨설팅** | 교육(2단계 과제 정의)을 넘어선 **AX 로드맵·방향 심화 구체화** | 방향을 더 명확히 하고 싶은 기업 |
| ② **구축 ((주)팩앤롤)** | 자체 개발이 어려우면 **실제 솔루션 개발 의뢰** | 자체 역량이 부족한 기업 |
| ③ **정부지원 컨설팅** | **2027 지원사업** 신청·선정·구축까지 대응 | 장비 투자·정부지원이 필요한 기업 |

> ①은 커리큘럼 2단계의 '진단·과제 정의'와 구분되는 **교육 이후 심화 서비스**.

**시각화** ✅: 가운데 **[10주 교육]** 블록 → 거기서 **① 심화 컨설팅 / ② 구축 / ③ 정부지원** 3갈래로 뻗는 도식. (선형 화살표 5단계 ❌)

> 💡 이 모델은 §10 FAQ와 정확히 맞물림: "구축 안 하면 의미 없나요? → 구축은 **선택**", "정부지원 꼭 받아야? → **필수 아님**".

| 수요 기업의 **교육 신청·상담 리드 수집** | 신청 폼 제출 수, 상담 예약 수 |
| "AX 전문 당사"라는 **신뢰·전문성 각인** | 체류시간, 커리큘럼/결과물 섹션 도달률 |
| 강사 **개인 브랜딩**과 연결 | 소셜 채널 유입·팔로우 전환 |
| 2027 1분기 **정부지원 사업 연결 파이프라인 확보** | 상담 → 컨설팅 전환율 |

> **핵심 원칙**: 방문자가 "이건 나를 위한 거다 → 뭘 얻는지 명확 → 지금 신청/상담"까지 이어지도록 설계.

[Phase 4] 결과물·데모 제작  8월 (병행)          ─┤ 병행 진행
[Phase 2] 디자인·브랜딩    8월 1~2주차          ─┘
     │
[Phase 3] 개발·구축        8월 2~3주차
     │
[Phase 5] 내부 검증·QA     8월 4주차
     │
[Phase 6] 소프트 오픈·보완  9월 1주차
     │
[Phase 7] ★ 공식 오픈      9월
     │

## 2. 단계별 상세 작업

### Phase 0 — 기획 · 전략 (7월 2~3주차)

랜딩페이지 제작 전 **전략을 확정**하는 가장 중요한 단계. 여기서 흔들리면 이후 전부 재작업.

- [ ] **목표·KPI 확정** — 1차 목표를 "교육 신청"으로 할지 "무료 상담 예약"으로 할지 결정 (초기엔 진입장벽 낮은 **무료 상담/설명회 신청** 권장)
- [ ] **타겟 페르소나 정의** — 제조/물류 중소기업의 대표·기획 담당자. 그들의 고민(무엇부터? 비용? 정부지원 시기?)을 문장으로 명시
- [ ] **핵심 가치 제안(Value Proposition)** 1문장 확정 — 예: "제조·물류 기업이 AI/AX를 어디서부터, 어떻게, 얼마로 시작할지 10주 만에 실행 결과물까지"
- [ ] **벤치마킹** — 국내외 교육/컨설팅 랜딩페이지 5~10개 수집·분석 (구조, 카피, CTA 배치)
- [ ] **브랜드 네이밍·톤** 확정 — 회사 홈페이지와 분리된 별도 브랜드명/도메인
- [ ] **제작 방식 결정** — 아래 §5 참고 (노코드 vs 바이브코딩 자체 제작)

**산출물**: 기획서 1장(목표·페르소나·VP·KPI), 벤치마킹 정리, 브랜드명/도메인 후보

---

### Phase 1 — 콘텐츠 · 카피 설계 (7월 4주 ~ 8월 1주)

페이지의 **뼈대(정보 구조)와 문구**를 먼저 텍스트로 완성. 디자인·개발은 이게 끝나야 시작.

- [ ] **페이지 구조(와이어프레임)** 확정 — §4 섹션 순서대로
- [ ] **섹션별 카피라이팅** — 헤드라인, 서브카피, 본문, CTA 문구
- [ ] **커리큘럼 콘텐츠** 정리 — 10주 3단계(AI 기본 → 컨설팅·주제선정 → 개발 실습)를 방문자가 이해할 수 있게 요약
- [ ] **대상·기대효과** 명확화 — "누가 들으면 무엇을 얻는가"
- [ ] **일정·가격 정책** — 교육 회차, 요일/시간(토 09~18 또는 14~18 등), 단가 확정
- [ ] **FAQ 초안** — 예상 질문 10개 (비용, 정부지원, 사전지식, 환급 여부 등)
- [ ] **강사 소개 원고** — 이력·경력 중심 (신뢰는 회사가 아닌 개인에게서 나옴)

**산출물**: 섹션별 카피 문서(그대로 페이지에 넣을 수 있는 수준)

---

### Phase 2 — 디자인 · 브랜딩 (8월 1~2주차)

- [ ] **브랜드 기본 요소** — 로고, 컬러 팔레트, 폰트, 톤앤매너
- [ ] **시안(목업) 디자인** — 헤로 섹션 우선 → 전체 섹션
- [ ] **반응형 설계** — 모바일 우선(리드의 상당수가 모바일 유입)
- [ ] **시각 자산 준비** — 아이콘, 다이어그램(고도화 1·2·3단계, 커리큘럼 흐름)
- [ ] **결과물 데모의 배치 디자인** — Phase 4 산출물을 어떻게 보여줄지

**산출물**: 전체 페이지 디자인 시안(모바일/PC)

> AI 디자인 도구(예: 이미지 생성, 목업 자동화)를 활용하면 제작 속도 확보 가능.

---

### Phase 3 — 개발 · 구축 (8월 2~3주차)

- [ ] **플랫폼 세팅** — §5에서 정한 방식으로 페이지 구현
- [ ] **도메인 연결 · 호스팅** — 별도 브랜드 도메인 구매·연결, SSL(https) 적용
- [ ] **리드 수집 폼 구축** — 신청/상담 폼 → 데이터 저장(스프레드시트/DB) + 알림(이메일·카톡)
- [ ] **CTA 동작 연결** — 버튼 → 폼/상담 예약(예: 캘린들리류 예약 도구)
- [ ] **애널리틱스 설치** — GA4, (광고 예정 시) 메타/구글 픽셀, 히트맵 도구
- [ ] **SEO 기본** — 타이틀·메타 설명, OG 태그(공유 시 썸네일), 사이트맵
- [ ] **속도·이미지 최적화**

**산출물**: 실제 동작하는 랜딩페이지(비공개 URL)

---

### Phase 4 — 결과물 · 데모 자료 제작 (8월, 전 과정 병행)

녹취에서 강조된 **"결과물을 보여주는 것"**이 전환의 핵심. 커리큘럼만으로는 부족하고 **실제 아웃풋 시연**이 있어야 관심으로 이어짐.

- [ ] **업종별 AI 활용 사례** 2~3개 제작 (제조/물류 각각)
- [ ] **Before/After 시각 자료** — "AI를 엑셀처럼 쓰는 수준"을 넘는 실제 개발 결과물
- [ ] **강의안·PPT·영상** 초안 — 8월까지 제작 (사업계획서상 목표), 일부를 미리보기로 노출
- [ ] **후기/사례**(가능 시) — 초기엔 파일럿/베타 참여자 확보해 확보

**산출물**: 데모 이미지·영상·미리보기 자료 (랜딩페이지 삽입용)

---

### Phase 5 — 내부 검증 · QA (8월 4주차)

- [ ] **내부 검증** — 커리큘럼·서비스 내용이 맞는지 내부 리뷰(녹취에서 명시한 절차)
- [ ] **카피·팩트 점검** — 정부지원 시기·조건 등 오정보 없는지 확인
- [ ] **기능 QA** — 폼 제출 → 데이터 저장 → 알림 수신까지 실제 테스트
- [ ] **크로스 브라우저·기기 테스트** — 모바일/PC, 크롬/사파리 등
- [ ] **개인정보 처리방침·수집 동의** 문구 (폼에 필수)

**산출물**: QA 체크리스트 통과, 수정 반영본

---

### Phase 6 — 소프트 오픈 · 보완 (9월 1주차)

- [ ] **소프트 런칭** — 지인·잠재고객 소수에게 먼저 공유 → 피드백
- [ ] **전환 흐름 점검** — 실제 유입에서 이탈 지점 확인, 카피/CTA 미세조정
- [ ] **분석 데이터 확인** — 유입·체류·폼 전환 정상 집계 여부

---

### Phase 7 — ★ 공식 오픈 (9월)

- [ ] **공식 오픈 공지** — 소셜 채널(인스타/링크드인/페이스북/스레드) 동시 발행
- [ ] **개인 브랜딩 연계** — 강사 개인 PR 콘텐츠와 상호 링크
- [ ] **트래픽 유입 시작** — 꾸준한 콘텐츠 업로드로 트래픽 누적
- [ ] **10월 교육 정식 운영**으로 연결

---

## 3. 병행 트랙: 개인 브랜딩·소셜 (지금 즉시 시작)

랜딩페이지와 **별개로 병행**해야 하는 축. "되든 안 되든 꾸준히 올려야 쌓이고 트래픽이 발생"한다.

- [ ] 채널 개설·정비 — **링크드인(우선)**, 인스타그램, 스레드/페이스북
- [ ] 강사 개인 소개/이력 페이지 (어떤 강의·단가 명시)
- [ ] 주 N회 콘텐츠 발행 루틴 확정 → **오늘부터 시작** (오픈 시점까지 자산·신뢰 누적)

## 4. 랜딩페이지 섹션 구조 (권장 순서)

| # | 섹션 | 목적 | 핵심 요소 |
|---|------|------|-----------|
| 1 | **Hero** | 3초 안에 "나를 위한 것"임을 인지 | 헤드라인(가치 제안), 서브카피, 메인 CTA |
| 2 | **문제 제기** | 공감 형성 | "AX/DX 뭐부터? 비용은? 정부지원 언제?"의 고민 |
| 3 | **솔루션** | 해결책 제시 | 교육 → 컨설팅 → 구축 3단계 흐름 |
| 4 | **커리큘럼** | 구체성·전문성 | 10주 3단계 표, 단계별 산출물 |
| 5 | **결과물·데모** | 신뢰·차별화 | 업종별 AI 활용 사례, Before/After |
| 6 | **강사 소개** | 개인 신뢰 | 이력·경력, 소셜 링크 |
| 7 | **대상·기대효과** | 자기 확인 | "이런 기업이라면" 체크리스트 |
| 8 | **정부지원 연계** | 실질 이점 | 2027 1분기 지원사업 로드맵 안내 |
| 9 | **일정·가격** | 결정 지원 | 회차·요일·시간·단가 |
| 10 | **FAQ** | 반론 해소 | 예상 질문 8~10개 |
| 11 | **신청·상담 폼(CTA)** | 전환 | 리드 수집 폼(진입장벽 낮게) |
| 12 | **Footer** | 신뢰·연결 | 회사 정보, 소셜, 문의처 |

> **CTA는 Hero·중간·하단 최소 3회 반복 배치.** 초기 1차 전환 목표는 "무료 상담/설명회 신청" 권장.

## 5. 제작 방식 결정 (Phase 0에서 확정)

| 방식 | 장점 | 단점 | 추천 상황 |
|------|------|------|-----------|
| **노코드 빌더** (Framer, Webflow, 아임웹, 카드형 등) | 빠름, 디자인 완성도, 폼·호스팅 내장 | 커스터마이즈 한계, 구독료 | 속도 우선, 마케팅 중심 |
| **바이브코딩 자체 제작** (AI 보조 코딩) | 완전한 자유도, 확장성, 자산 내재화 | 시간·유지관리 부담 | 직접 개발 역량·의지 있을 때 |
| **하이브리드** | 랜딩은 노코드, 데모/도구는 자체 개발 | 도구 이원화 | **권장** |

> 녹취상 "바이브코딩을 개인적으로 하는 게 맞다"는 방향 → **랜딩페이지 본체는 빠른 노코드로 9월 오픈을 맞추고, 결과물 데모·자체 도구는 바이브코딩으로 병행**하는 하이브리드가 일정·품질 양립에 유리.

## 8. 흔한 리스크 & 대응

| 리스크 | 대응 |
|--------|------|
| 콘텐츠(카피·커리큘럼) 확정 지연 → 전체 지연 | Phase 1을 **가장 먼저·집중** 완료. 디자인/개발은 그 뒤 |

/* ---------------- markdown parser ---------------- */
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function renderLink(t,u){
  var text = esc(t);
  var m;
  if(/\.md(#|$)/.test(u) || /^\d{2}_/.test(u)){
    m = u.match(/(\d{2})_/) || u.match(/^(\d{2})/);
    if(m && META[m[1]]) return '<a class="xref" href="#doc-'+m[1]+'" data-doc="'+m[1]+'">'+text+'</a>';
  }
  if(/^https?:\/\//.test(u)) return '<a class="ext" href="'+esc(u)+'" target="_blank" rel="noopener">'+text+'</a>';
  if(/^(mailto:|tel:)/.test(u)) return '<a href="'+esc(u)+'">'+text+'</a>';
  return '<span class="reflink" title="'+esc(u)+'">'+text+'</span>';
}

function inlineMD(text){
  var codes=[], links=[];
  var s = String(text).replace(/`([^`]+)`/g, function(m,c){ codes.push(c); return "C"+(codes.length-1)+""; });
  s = s.replace(/\[([^\]]*)\]\(([^)]+)\)/g, function(m,t,u){ links.push({t:t,u:u}); return "L"+(links.length-1)+""; });
  s = esc(s);
  s = s.replace(/(^|[\s(>])(https?:\/\/[^\s<)\]|]+)/g, function(m,pre,u){ return pre+'<a class="ext" href="'+u+'" target="_blank" rel="noopener">'+u+'</a>'; });
  s = s.replace(/\*\*([^*]+?)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/~~([^~]+?)~~/g, "<del>$1</del>");
  s = s.replace(/(^|[\s(>])\*(\S(?:[^*\n]*\S)?)\*(?=$|[\s).,;:!?<])/g, "$1<em>$2</em>");
  s = s.replace(/L(\d+)/g, function(m,i){ return renderLink(links[+i].t, links[+i].u); });
  s = s.replace(/C(\d+)/g, function(m,i){ return "<code>"+esc(codes[+i])+"</code>"; });
  return s;
}

function splitRow(line){
  var s = line.trim().replace(/^\|/,"").replace(/\|$/,"");
  return s.split("|").map(function(c){ return c.trim(); });
}
function isDelim(l){
  if(l.indexOf("|")<0) return false;
  var cells = splitRow(l);
  return cells.length>0 && cells.every(function(c){ return /^:?-{2,}:?$/.test(c.replace(/\s/g,"")); });
}
function alignOf(c){ c=c.trim(); var l=c.charAt(0)===":", r=c.charAt(c.length-1)===":"; return (l&&r)?"center":r?"right":l?"left":""; }
function alAttr(a){ return a?(' style="text-align:'+a+'"'):""; }

function buildList(entries){
  entries.forEach(function(e){
    var c=e.raw, cb=c.match(/^\[([ xX])\]\s+([\s\S]*)$/);
    if(cb){ e.task=true; e.checked=/x/i.test(cb[1]); c=cb[2]; }
    e.html = inlineMD(c);
  });
  var pos={i:0};
  function make(indent){
    var ordered = entries[pos.i].ordered;
    var h = ordered ? "<ol>" : "<ul>";
    while(pos.i<entries.length && entries[pos.i].indent===indent){
      var e=entries[pos.i]; pos.i++;
      var inner = (e.task ? '<span class="cb'+(e.checked?" on":"")+'" aria-hidden="true"></span>' : "") + e.html;
      var child = "";
      if(pos.i<entries.length && entries[pos.i].indent>indent){ child = make(entries[pos.i].indent); }
      h += "<li"+(e.task?' class="task"':"")+">"+inner+child+"</li>";
    }
    h += ordered ? "</ol>" : "</ul>";
    return h;
  }
  return make(entries[0].indent);
}

function renderQuote(buf){
  var paras=[], cur=[];
  buf.forEach(function(l){ if(l.trim()===""){ if(cur.length){paras.push(cur);cur=[];} } else cur.push(l); });
  if(cur.length) paras.push(cur);
  var h="<blockquote>";
  paras.forEach(function(p){ h += "<p>"+p.map(function(l){return inlineMD(l);}).join("<br>")+"</p>"; });
  return h+"</blockquote>";
}

function renderMD(md, docNum){
  var lines = md.replace(/\r\n?/g,"\n").replace(/\t/g,"    ").split("\n");
  var out=[], toc=[], i=0;
  function isTaskable(l){ return /^\s*([-*+]|\d+\.)\s+/.test(l); }
  while(i<lines.length){
    var line=lines[i], t=line.trim();
    if(/^```/.test(t)){
      i++; var buf=[];
      while(i<lines.length && lines[i].trim().indexOf("```")!==0){ buf.push(lines[i]); i++; }
      i++;
      out.push('<div class="pre-wrap"><pre><code>'+esc(buf.join("\n"))+"</code></pre></div>");
      continue;
    }
    if(t===""){ i++; continue; }
    if(/^#{1,6}\s/.test(t)){
      var hm=t.match(/^(#{1,6})\s+([\s\S]*)$/), lvl=hm[1].length, txt=hm[2].replace(/\s+#+\s*$/,"");
      var idAttr="";
      if(lvl===2){ var id="sec-"+docNum+"-"+toc.length; toc.push({text:txt.replace(/[*`]/g,""), id:id}); idAttr=' id="'+id+'"'; }
      out.push("<h"+lvl+idAttr+">"+inlineMD(txt)+"</h"+lvl+">");
      i++; continue;
    }
    if(/^---+$/.test(t)){ out.push("<hr>"); i++; continue; }
    if(t.charAt(0)===">"){
      var qb=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ qb.push(lines[i].replace(/^\s*>\s?/,"")); i++; }
      out.push(renderQuote(qb)); continue;
    }
    if(line.indexOf("|")>=0 && i+1<lines.length && isDelim(lines[i+1])){
      var header=splitRow(line); i++;
      var aligns=splitRow(lines[i]).map(alignOf); i++;
      var rows=[];
      while(i<lines.length && lines[i].indexOf("|")>=0 && lines[i].trim()!=="" && lines[i].trim().charAt(0)!==">" && !/^#{1,6}\s/.test(lines[i].trim())){
        rows.push(splitRow(lines[i])); i++;
      }
      var cols=header.length, th="";
      header.forEach(function(c,x){ th += "<th"+alAttr(aligns[x])+">"+inlineMD(c)+"</th>"; });
      var tb="";
      rows.forEach(function(r){ tb+="<tr>"; for(var k=0;k<cols;k++){ tb+="<td"+alAttr(aligns[k])+">"+inlineMD(r[k]!=null?r[k]:"")+"</td>"; } tb+="</tr>"; });
      out.push('<div class="table-wrap"><table><thead><tr>'+th+"</tr></thead><tbody>"+tb+"</tbody></table></div>");
      continue;
    }
    if(isTaskable(line)){
      var entries=[];
      while(i<lines.length){
        var lm=lines[i].match(/^(\s*)([-*+]|\d+\.)\s+([\s\S]*)$/);
        if(!lm){
          if(entries.length && /^\s+\S/.test(lines[i]) && lines[i].trim()!==""){ entries[entries.length-1].raw += " "+lines[i].trim(); i++; continue; }
          break;
        }
        entries.push({ indent:lm[1].length, ordered:/^\d+\./.test(lm[2]), raw:lm[3] });
        i++;
      }
      out.push(buildList(entries)); continue;
    }
    var pb=[];
    while(i<lines.length){
      var pt=lines[i].trim();
      if(pt===""||/^#{1,6}\s/.test(pt)||pt.charAt(0)===">"||/^```/.test(pt)||/^---+$/.test(pt)||isTaskable(lines[i])||(lines[i].indexOf("|")>=0 && i+1<lines.length && isDelim(lines[i+1]))) break;
      pb.push(lines[i]); i++;
    }
    var cls = (pb.length===1 && /^\*\*[^*].*\*\*/.test(pb[0].trim())) ? ' class="subhead"' : "";
    out.push("<p"+cls+">"+inlineMD(pb.join(" ").trim())+"</p>");
  }
  return { html: out.join("\n"), toc: toc };
}

/* ---------------- views ---------------- */
function statusClass(s){ if(/확정/.test(s)) return "s-good"; if(/초안|임시/.test(s)) return "s-warn"; return "s-neu"; }

function pagerLink(id, dir){
  var lbl = dir==="prev" ? "이전" : "다음";
  var title = id==="cover" ? "전체 개요" : (seqOf(id)+" · "+META[id].title);
  var arrow = dir==="prev" ? "← " : " →";
  var tt = dir==="prev" ? (arrow+"") : "";
  return '<a class="'+dir+'" href="#'+(id==="cover"?"overview":"doc-"+id)+'" data-nav="'+id+'">'+
         '<div class="plabel">'+(dir==="prev"?"← ":"")+lbl+" 문서"+(dir==="next"?" →":"")+'</div>'+
         '<div class="ptitle">'+esc(title)+'</div></a>';
}

function docView(num){
  if(cache[num]) return cache[num];
  var src = (document.getElementById("src-"+num)||{}).textContent || "";
  var r = renderMD(src, num);
  var c = META[num];
  var eyebrow = '<div class="doc-eyebrow"><span>'+seqOf(num)+" / "+TOTAL+"</span><span class=\"dot\">·</span>"+
                '<span class="grp">'+esc(c.group)+'</span>'+
                '<span class="status '+statusClass(c.status)+'">'+esc(c.status)+'</span></div>';
  var sec = "";
  if(r.toc.length>2){
    sec = '<nav class="secnav" aria-label="이 문서 목차"><span class="secnav-l">목차</span>'+
          r.toc.map(function(x){ return '<a href="#'+x.id+'" data-jump="'+x.id+'">'+esc(x.text)+'</a>'; }).join("")+"</nav>";
  }
  var idx = ORDER.indexOf(num);
  var prevId = ORDER[idx-1], nextId = ORDER[idx+1];
  var pager = '<nav class="pager">'+
      (prevId ? pagerLink(prevId,"prev") : '<a class="spacer"></a>')+
      (nextId ? pagerLink(nextId,"next") : '<a class="spacer"></a>')+
    "</nav>";
  cache[num] = eyebrow + sec + '<article class="md">'+r.html+"</article>" + pager;
  return cache[num];
}

    '</div>'+
    '<div class="dtable-wrap"><table class="dtable"><thead><tr>'+
      '<th class="c-chk">✓</th><th class="c-cat">묶음</th><th>항목</th><th>확정 필요 내용</th><th class="c-st">상태</th><th class="c-doc">문서</th>'+

var view = document.getElementById("view");
var navEl = document.getElementById("nav");
var topTitle = document.getElementById("topTitle");

(function buildNav(){
  var h = '<a class="ov" href="#overview" data-nav="cover"><span class="n">◆</span><span>개요</span></a>';
  var lastGroup=null;
  CFG.forEach(function(c,idx){
    if(c.group!==lastGroup){ h += '<div class="grp">'+esc(c.group)+"</div>"; lastGroup=c.group; }
    h += '<a href="#doc-'+c.num+'" data-nav="'+c.num+'"><span class="n">'+("0"+(idx+1)).slice(-2)+'</span><span>'+esc(c.title)+"</span></a>";
  });
  navEl.innerHTML = h;
})();

function setActive(id){
  var links = navEl.querySelectorAll("a");
  for(var i=0;i<links.length;i++){
    var on = links[i].getAttribute("data-nav")===id;
    links[i].classList.toggle("active", on);
    if(on) links[i].setAttribute("aria-current","page"); else links[i].removeAttribute("aria-current");
  }
}

function restoreChecks(){
  var done={}; try{ done=JSON.parse(localStorage.getItem("g3-decisions")||"{}"); }catch(e){}
  var boxes = view.querySelectorAll(".dcheck");
  for(var i=0;i<boxes.length;i++){
    var cb=boxes[i], on=!!done[cb.getAttribute("data-key")];
    cb.checked=on; var tr=cb.closest("tr"); if(tr) tr.classList.toggle("done",on);
  }
}
function show(id, noScroll){
  if(id!=="cover" && !META[id]) id="cover";
  view.innerHTML = (id==="cover") ? coverView() : docView(id);
  if(id==="cover") restoreChecks();
  setActive(id);
  topTitle.textContent = (id==="cover") ? "개요" : (seqOf(id)+" · "+META[id].title);
  document.title = (id==="cover") ? "G3아카데미 · 사업전략 문서" : (seqOf(id)+" "+META[id].title+" · G3아카데미");
  closeNav();
  if(!noScroll) window.scrollTo(0,0);
}

function idFromHash(){
  var hsh = location.hash.replace(/^#/,"");
  if(hsh==="overview"||hsh==="") return "cover";
  var m = hsh.match(/^doc-(\d{2})$/);
  if(m && META[m[1]]) return m[1];
  return null;
}

function route(){
  var id = idFromHash();
  if(id) show(id);
}

/* nav / card / pager clicks -> set hash (hashchange drives render) */
document.addEventListener("click", function(e){
  var jump = e.target.closest ? e.target.closest("[data-jump]") : null;
  if(jump){
    e.preventDefault();
    var el = document.getElementById(jump.getAttribute("data-jump"));
    if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
    return;
  }
  var nav = e.target.closest ? e.target.closest("[data-nav]") : null;
  if(nav){
    e.preventDefault();
    var id = nav.getAttribute("data-nav");
    var newHash = "#"+(id==="cover"?"overview":"doc-"+id);
    if(location.hash===newHash){ show(id); } else { location.hash=newHash; }
    return;
  }
  var xref = e.target.closest ? e.target.closest("a.xref[data-doc]") : null;
  if(xref){
    e.preventDefault();
    var d = xref.getAttribute("data-doc");
    var nh = "#doc-"+d;
    if(location.hash===nh){ show(d); } else { location.hash=nh; }
  }
});

/* decisions 체크박스 상태 저장(브라우저 localStorage) */
document.addEventListener("change", function(e){
  var cb = (e.target && e.target.classList && e.target.classList.contains("dcheck")) ? e.target : null;
  if(!cb) return;
  var key = cb.getAttribute("data-key");
  var done={}; try{ done=JSON.parse(localStorage.getItem("g3-decisions")||"{}"); }catch(e2){}
  if(cb.checked) done[key]=1; else delete done[key];
  try{ localStorage.setItem("g3-decisions", JSON.stringify(done)); }catch(e2){}
  var tr = cb.closest("tr"); if(tr) tr.classList.toggle("done", cb.checked);
});

window.addEventListener("hashchange", route);

/* ---------------- drawer + theme ---------------- */
var body=document.body;
function openNav(){ body.classList.add("nav-open"); }
function closeNav(){ body.classList.remove("nav-open"); }
document.getElementById("ham").addEventListener("click", function(){ body.classList.toggle("nav-open"); });
document.getElementById("scrim").addEventListener("click", closeNav);

function currentTheme(){
  var t=document.documentElement.getAttribute("data-theme");
  if(t) return t;
  return window.matchMedia && window.matchMedia("(prefers-color-scheme:dark)").matches ? "dark":"light";
}
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  try{ localStorage.setItem("g3-theme", t); }catch(e){}
  var ico = t==="dark" ? "☀" : "☾";
  var im=document.getElementById("themeIco"); if(im) im.textContent=ico;
  var tm=document.getElementById("themeM"); if(tm) tm.textContent=ico;
  var lb=document.getElementById("themeLbl"); if(lb) lb.textContent = t==="dark" ? "라이트 모드" : "다크 모드";
}
function toggleTheme(){ applyTheme(currentTheme()==="dark" ? "light":"dark"); }
document.getElementById("themeD").addEventListener("click", toggleTheme);
document.getElementById("themeM").addEventListener("click", toggleTheme);
(function initTheme(){
  var saved=null; try{ saved=localStorage.getItem("g3-theme"); }catch(e){}
  applyTheme(saved || currentTheme());
})();

/* ---------------- boot ---------------- */
route();
if(!idFromHash()) show("cover", true);

})();
</script>

</body>
</html>
